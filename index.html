<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Mapper</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-elevated: #12121a;
  --bg-surface: #1a1a25;
  --border: #2a2a3a;
  --text: #e8e6f0;
  --text-dim: #8888a0;
  --text-muted: #555568;
  --accent: #ff6b4a;
  --accent-glow: rgba(255, 107, 74, 0.3);
  --accent2: #4af0c8;
  --accent2-glow: rgba(74, 240, 200, 0.2);
  --accent3: #7b6bff;
  --danger: #ff4466;
  --radius: 8px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-serif: 'Instrument Serif', serif;
}
 
* { margin: 0; padding: 0; box-sizing: border-box; }
 
html, body { 
  height: 100%; 
  background: var(--bg); 
  color: var(--text); 
  font-family: var(--font-mono); 
  font-size: 13px;
  overflow: hidden;
}
 
/* LAYOUT */
.app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
 
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  z-index: 100;
}
 
header h1 {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 10px;
}
 
header h1 span.icon {
  display: inline-block;
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 50%;
  position: relative;
}
header h1 span.icon::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 2px solid var(--bg);
  border-radius: 50%;
}
 
.status-bar {
  font-size: 11px;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 8px;
}
 
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s;
}
.status-dot.active { background: var(--accent2); box-shadow: 0 0 8px var(--accent2-glow); }
 
.main-content {
  display: grid;
  grid-template-columns: 320px 1fr;
  overflow: hidden;
}
 
/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg-elevated);
  overflow-y: auto;
  padding: 0;
}
 
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
.panel {
  border-bottom: 1px solid var(--border);
}
 
.panel-header {
  padding: 14px 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
 
.panel-header:hover { color: var(--text); }
.panel-header .chevron { transition: transform 0.2s; font-size: 14px; }
.panel-header.collapsed .chevron { transform: rotate(-90deg); }
 
.panel-body {
  padding: 0 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
 
.panel-body.collapsed { display: none; }
 
/* DROP ZONE */
.drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
 
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(255, 107, 74, 0.04);
}
 
.drop-zone .label {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}
 
.drop-zone .label strong {
  color: var(--accent);
  font-weight: 500;
}
 
.file-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 120px;
  overflow-y: auto;
}
 
.file-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--bg-surface);
  border-radius: 4px;
  font-size: 11px;
}
 
.file-item .name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 180px;
}
 
.file-item .meta { color: var(--text-muted); font-size: 10px; }
 
.file-item .remove {
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
}
.file-item .remove:hover { color: var(--danger); }
 
/* FORM ELEMENTS */
label.field-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-bottom: 6px;
}
 
.checkbox-group { display: flex; flex-direction: column; gap: 6px; }
 
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--bg-surface);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 12px;
}
 
.checkbox-item:hover { background: #1e1e2c; }
 
.checkbox-item input[type="checkbox"] {
  appearance: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
 
.checkbox-item input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
 
.checkbox-item input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: white;
  font-weight: bold;
}
 
.radio-group { display: flex; flex-direction: column; gap: 6px; }
 
.radio-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--bg-surface);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 12px;
}
 
.radio-item:hover { background: #1e1e2c; }
 
.radio-item input[type="radio"] {
  appearance: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
 
.radio-item input[type="radio"]:checked {
  border-color: var(--accent2);
}
 
.radio-item input[type="radio"]:checked::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 6px; height: 6px;
  background: var(--accent2);
  border-radius: 50%;
}
 
.range-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
 
.range-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
 
input[type="range"] {
  flex: 1;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
 
input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
 
.range-value {
  font-size: 11px;
  color: var(--accent);
  min-width: 36px;
  text-align: right;
}
 
/* BUTTONS */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
 
.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
 
.btn-secondary {
  background: var(--bg-surface);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
 
/* CANVAS AREA */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
 
.canvas-area canvas {
  width: 100%;
  height: 100%;
  display: block;
}
 
/* EMPTY STATE */
.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: none;
}
 
.empty-state .rings {
  width: 120px; height: 120px;
  position: relative;
  opacity: 0.15;
}
 
.empty-state .rings .ring {
  position: absolute;
  border: 1.5px solid var(--text-dim);
  border-radius: 50%;
  animation: pulse-ring 3s ease-in-out infinite;
}
 
.empty-state .rings .ring:nth-child(1) { inset: 0; animation-delay: 0s; }
.empty-state .rings .ring:nth-child(2) { inset: 15px; animation-delay: 0.5s; }
.empty-state .rings .ring:nth-child(3) { inset: 30px; animation-delay: 1s; }
.empty-state .rings .ring:nth-child(4) { inset: 45px; animation-delay: 1.5s; }
 
@keyframes pulse-ring {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
 
.empty-state p {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  font-family: var(--font-serif);
}
 
/* TOOLTIP */
.tooltip {
  position: absolute;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  pointer-events: none;
  font-size: 11px;
  z-index: 50;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  max-width: 220px;
  display: none;
}
 
.tooltip .tt-title { font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.tooltip .tt-row { color: var(--text-dim); margin: 2px 0; }
 
/* PROGRESS */
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
 
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}
 
.progress-text {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  min-height: 14px;
}
 
/* PLAYBACK INDICATOR */
.now-playing {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 8px 20px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 40;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  display: none;
}
 
.now-playing .wave-icon {
  display: flex; gap: 2px; align-items: flex-end; height: 14px;
}
 
.now-playing .wave-icon span {
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
  animation: wave-bar 0.6s ease-in-out infinite alternate;
}
 
.now-playing .wave-icon span:nth-child(1) { height: 4px; animation-delay: 0s; }
.now-playing .wave-icon span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
.now-playing .wave-icon span:nth-child(3) { height: 6px; animation-delay: 0.3s; }
.now-playing .wave-icon span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
.now-playing .wave-icon span:nth-child(5) { height: 5px; animation-delay: 0.25s; }
 
@keyframes wave-bar {
  to { height: 14px; }
}
 
/* LEGEND */
.legend {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 10px;
  z-index: 30;
  display: none;
}
 
.legend-title {
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
 
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 3px 0;
  color: var(--text-dim);
}
 
.legend-swatch {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
 
/* ZOOM CONTROLS */
.zoom-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 30;
}
 
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.zoom-btn:hover { border-color: var(--text-muted); color: var(--text); }
 
/* Loading overlay */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10, 10, 15, 0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 60;
  display: none;
}
 
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
 
@keyframes spin { to { transform: rotate(360deg); } }
 
.loading-overlay p { font-size: 12px; color: var(--text-dim); }
 
/* Responsive */
@media (max-width: 800px) {
  .main-content { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { max-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>
 
<div class="app">
  <header>
    <h1><span class="icon"></span> Audio Cartographer</h1>
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Waiting for audio</span>
    </div>
  </header>
 
  <div class="main-content">
    <aside class="sidebar">
      <!-- UPLOAD PANEL -->
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">
          Input <span class="chevron">▾</span>
        </div>
        <div class="panel-body">
          <div class="drop-zone" id="dropZone">
            <div class="label">
              Drop audio files here or <strong>click to browse</strong><br>
              <span style="font-size:10px; color: var(--text-muted)">.wav .mp3 .ogg .flac · files or folders</span>
            </div>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display:none">
            <input type="file" id="folderInput" webkitdirectory style="display:none">
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" style="flex:1; font-size:10px;" onclick="document.getElementById('fileInput').click()">Files</button>
            <button class="btn btn-secondary" style="flex:1; font-size:10px;" onclick="document.getElementById('folderInput').click()">Folder</button>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
 
      <!-- SEGMENTATION PANEL -->
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">
          Segmentation <span class="chevron">▾</span>
        </div>
        <div class="panel-body">
          <div class="range-field">
            <label class="field-label">Onset Sensitivity (← more ╌ fewer →)</label>
            <div class="range-row">
              <input type="range" id="onsetThreshold" min="0.01" max="0.5" step="0.01" value="0.1">
              <span class="range-value" id="onsetValue">0.10</span>
            </div>
          </div>
          <div class="range-field">
            <label class="field-label">Min Segment (ms)</label>
            <div class="range-row">
              <input type="range" id="minSegment" min="20" max="500" step="10" value="80">
              <span class="range-value" id="minSegValue">80</span>
            </div>
          </div>
          <div class="range-field">
            <label class="field-label">Max Segment (ms)</label>
            <div class="range-row">
              <input type="range" id="maxSegment" min="500" max="10000" step="100" value="4000">
              <span class="range-value" id="maxSegValue">4000</span>
            </div>
          </div>
        </div>
      </div>
 
      <!-- FEATURES PANEL -->
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">
          Features / Metrics <span class="chevron">▾</span>
        </div>
        <div class="panel-body">
          <label class="field-label">Select features to extract</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="feature" value="rms" checked> RMS Energy</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="zcr" checked> Zero-Crossing Rate</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="centroid" checked> Spectral Centroid</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="bandwidth"> Spectral Bandwidth</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="rolloff"> Spectral Rolloff</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="flatness"> Spectral Flatness</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="mfcc" checked> MFCCs (13 bands)</label>
            <label class="checkbox-item"><input type="checkbox" name="feature" value="chroma"> Chroma (12 bins)</label>
          </div>
        </div>
      </div>
 
      <!-- REDUCTION PANEL -->
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">
          Dimensionality Reduction <span class="chevron">▾</span>
        </div>
        <div class="panel-body">
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="reduction" value="tsne" checked> t-SNE</label>
            <label class="radio-item"><input type="radio" name="reduction" value="pca"> PCA</label>
            <label class="radio-item"><input type="radio" name="reduction" value="umap"> UMAP</label>
          </div>
          <div class="range-field" id="perplexityField">
            <label class="field-label">Perplexity (t-SNE)</label>
            <div class="range-row">
              <input type="range" id="perplexity" min="5" max="50" step="1" value="30">
              <span class="range-value" id="perpValue">30</span>
            </div>
          </div>
          <div class="range-field" id="neighborsField" style="display:none">
            <label class="field-label">Neighbors (UMAP)</label>
            <div class="range-row">
              <input type="range" id="neighbors" min="5" max="50" step="1" value="15">
              <span class="range-value" id="neighborsValue">15</span>
            </div>
          </div>
        </div>
      </div>
 
      <!-- RUN -->
      <div class="panel">
        <div class="panel-body" style="padding-top: 16px;">
          <button class="btn btn-primary" id="runBtn" style="width:100%;" disabled onclick="runAnalysis()">
            Analyze &amp; Map
          </button>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText"></div>
        </div>
      </div>
    </aside>
 
    <div class="canvas-area" id="canvasArea">
      <canvas id="mapCanvas"></canvas>
 
      <div class="empty-state" id="emptyState">
        <div class="rings">
          <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
        </div>
        <p>Upload audio and run analysis to generate your map</p>
      </div>
 
      <div class="tooltip" id="tooltip">
        <div class="tt-title" id="ttTitle"></div>
        <div class="tt-row" id="ttInfo"></div>
      </div>
 
      <div class="now-playing" id="nowPlaying">
        <div class="wave-icon"><span></span><span></span><span></span><span></span><span></span></div>
        <span id="npText">Playing...</span>
      </div>
 
      <div class="legend" id="legend"></div>
 
      <div class="zoom-controls" id="zoomControls" style="display:none">
        <button class="zoom-btn" onclick="zoomMap(1.2)">+</button>
        <button class="zoom-btn" onclick="zoomMap(1/1.2)">−</button>
        <button class="zoom-btn" onclick="resetView()" style="font-size:11px;">⟲</button>
      </div>
 
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Processing audio...</p>
      </div>
    </div>
  </div>
</div>
 
<script>
// ─── STATE ────────────────────────────────────────────────────
const state = {
  files: [],         // { file, name, buffer: AudioBuffer }
  segments: [],      // { fileIdx, start, end, audioBuffer, features: {} }
  points: [],        // { x, y, segment }
  view: { x: 0, y: 0, scale: 1 },
  hoveredIdx: -1,
  playingIdx: -1,
  audioCtx: null,
  currentSource: null,
};
 
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
 
// ─── AUDIO CONTEXT ────────────────────────────────────────────
function getAudioCtx() {
  if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return state.audioCtx;
}
 
// ─── FILE HANDLING ────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');
 
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => addFiles(e.target.files));
folderInput.addEventListener('change', e => addFiles(e.target.files));
 
function addFiles(fileList) {
  const audioExts = ['.wav', '.mp3', '.ogg', '.flac', '.aac', '.m4a', '.webm'];
  for (const f of fileList) {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (audioExts.includes(ext) || f.type.startsWith('audio/')) {
      state.files.push({ file: f, name: f.name, buffer: null });
    }
  }
  renderFileList();
  document.getElementById('runBtn').disabled = state.files.length === 0;
}
 
function removeFile(idx) {
  state.files.splice(idx, 1);
  renderFileList();
  document.getElementById('runBtn').disabled = state.files.length === 0;
}

  const el = document.getElementById('fileList');
  el.innerHTML = state.files.map((f, i) => `
    <div class="file-item">
      <span class="name">${f.name}</span>
      <span class="meta">${(f.file.size / 1024).toFixed(0)}kb</span>
      <button class="remove" onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
}

// ─── CORE ANALYSIS PIPELINE ──────────────────────────────────
async function runAnalysis() {
  if (state.files.length === 0) return;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('loadingOverlay').style.display = 'flex';
  setStatus('Processing...', true);
 
  try {
    // 1. Decode audio files
    setProgress(5, 'Decoding audio files...');
    document.getElementById('loadingText').textContent = 'Decoding audio files...';
    const actx = getAudioCtx();
    for (let i = 0; i < state.files.length; i++) {
      if (!state.files[i].buffer) {
        const arrayBuf = await state.files[i].file.arrayBuffer();
        state.files[i].buffer = await actx.decodeAudioData(arrayBuf);
      }
      setProgress(5 + (i / state.files.length) * 15);
    }
 
    // 2. Onset detection & segmentation
    setProgress(20, 'Detecting onsets & segmenting...');
    document.getElementById('loadingText').textContent = 'Detecting onsets...';
    const threshold = parseFloat(document.getElementById('onsetThreshold').value);
    const minMs = parseInt(document.getElementById('minSegment').value);
    const maxMs = parseInt(document.getElementById('maxSegment').value);
 
    state.segments = [];
    for (let fi = 0; fi < state.files.length; fi++) {
      const buf = state.files[fi].buffer;
      const onsets = detectOnsets(buf, threshold, minMs / 1000);
      const segs = buildSegments(buf, onsets, minMs / 1000, maxMs / 1000);
      for (const seg of segs) {
        state.segments.push({ fileIdx: fi, start: seg.start, end: seg.end, audioBuffer: buf });
      }
      setProgress(20 + (fi / state.files.length) * 20);
    }
 
    if (state.segments.length < 2) {
      alert('Not enough segments found. Try lowering onset sensitivity or adding more audio.');
      throw new Error('Too few segments');
    }
 
    // 3. Feature extraction
    setProgress(40, `Extracting features from ${state.segments.length} segments...`);
    document.getElementById('loadingText').textContent = `Extracting features (${state.segments.length} segments)...`;
    const selectedFeatures = Array.from(document.querySelectorAll('input[name="feature"]:checked')).map(c => c.value);
    if (selectedFeatures.length === 0) {
      alert('Please select at least one feature.');
      throw new Error('No features selected');
    }
 
    const featureMatrix = [];
    for (let i = 0; i < state.segments.length; i++) {
      const seg = state.segments[i];
      const vec = extractFeatures(seg.audioBuffer, seg.start, seg.end, selectedFeatures);
      featureMatrix.push(vec);
      state.segments[i].features = vec;
      if (i % 10 === 0) setProgress(40 + (i / state.segments.length) * 30);
    }
 
    // 4. Normalize features
    setProgress(70, 'Normalizing feature matrix...');
    const normalized = normalizeMatrix(featureMatrix);
 
    // 5. Dimensionality reduction
    const method = document.querySelector('input[name="reduction"]:checked').value;
    setProgress(75, `Running ${method.toUpperCase()}...`);
    document.getElementById('loadingText').textContent = `Running ${method.toUpperCase()}...`;
 
    let coords;
    if (method === 'pca') {
      coords = runPCA(normalized);
    } else if (method === 'tsne') {
      const perp = parseInt(document.getElementById('perplexity').value);
      coords = await runTSNE(normalized, perp, (p) => setProgress(75 + p * 20));
    } else {
      const nn = parseInt(document.getElementById('neighbors').value);
      coords = runUMAP(normalized, nn);
    }
 
    setProgress(95, 'Building map...');
 
    // 6. Build points
    state.points = coords.map((c, i) => ({
      x: c[0], y: c[1],
      segment: state.segments[i],
      fileIdx: state.segments[i].fileIdx,
    }));
 
    // Normalize coordinates to [-1, 1]
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of state.points) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;
    for (const p of state.points) {
      p.x = ((p.x - minX) / rangeX) * 2 - 1;
      p.y = ((p.y - minY) / rangeY) * 2 - 1;
    }
 
    state.view = { x: 0, y: 0, scale: 1 };
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('zoomControls').style.display = '';
    buildLegend();
    setProgress(100, `Done! ${state.segments.length} segments mapped.`);
    setStatus(`${state.segments.length} segments mapped`, true);
    drawMap();
 
  } catch (err) {
    console.error(err);
    setStatus('Error occurred', false);
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
    btn.disabled = false;
  }
}
 
// ─── ONSET DETECTION ─────────────────────────────────────────
function detectOnsets(audioBuffer, sensitivity, minGap) {
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const hopSize = Math.round(sr * 0.01); // 10ms hop
  const frameSize = hopSize * 2;
  const onsets = [0]; // always start at 0
 
  // 1. Compute energy for every frame
  const energies = [];
  for (let i = 0; i < data.length - frameSize; i += hopSize) {
    let energy = 0;
    for (let j = 0; j < frameSize; j++) {
      energy += data[i + j] * data[i + j];
    }
    energies.push(energy / frameSize);
  }
 
  if (energies.length < 3) return onsets;
 
  // 2. Compute energy differences (onset detection function)
  const diffs = [0];
  for (let i = 1; i < energies.length; i++) {
    diffs.push(Math.max(0, energies[i] - energies[i - 1])); // half-wave rectify
  }
 
  // 3. Compute adaptive threshold using a moving median + mean
  const windowSize = Math.max(10, Math.round(0.2 * sr / hopSize)); // ~200ms window
  const meanDiff = diffs.reduce((a, b) => a + b, 0) / diffs.length;
  // sensitivity slider (0.01..0.5): low value = more sensitive = lower threshold
  // We invert it: threshold multiplier = sensitivity mapped so 0.01 → 0.5x mean, 0.5 → 8x mean
  const thresholdMult = 0.5 + (sensitivity / 0.5) * 7.5;
 
  for (let i = 1; i < diffs.length; i++) {
    // Local adaptive threshold: mean of surrounding window
    const wStart = Math.max(0, i - windowSize);
    const wEnd = Math.min(diffs.length, i + windowSize);
    let localSum = 0;
    for (let j = wStart; j < wEnd; j++) localSum += diffs[j];
    const localMean = localSum / (wEnd - wStart);
 
    const adaptiveThreshold = Math.max(localMean * thresholdMult, meanDiff * 0.1);
 
    if (diffs[i] > adaptiveThreshold && diffs[i] > 0) {
      const timeSec = (i * hopSize) / sr;
      if (timeSec - onsets[onsets.length - 1] > minGap) {
        onsets.push(timeSec);
      }
    }
  }
 
  // If we still got very few onsets, fall back to uniform segmentation
  if (onsets.length < 3) {
    onsets.length = 0;
    const dur = audioBuffer.duration;
    const segLen = Math.max(minGap, 0.25); // quarter-second segments
    for (let t = 0; t < dur; t += segLen) {
      onsets.push(t);
    }
  }
 
  return onsets;
}
 
function buildSegments(audioBuffer, onsets, minLen, maxLen) {
  const duration = audioBuffer.duration;
  const segments = [];
  for (let i = 0; i < onsets.length; i++) {
    const start = onsets[i];
    const end = i < onsets.length - 1 ? Math.min(onsets[i + 1], start + maxLen) : Math.min(duration, start + maxLen);
    if (end - start >= minLen) {
      segments.push({ start, end });
    }
  }
  return segments;
}
 
// ─── FEATURE EXTRACTION ──────────────────────────────────────
function extractFeatures(audioBuffer, startSec, endSec, featureNames) {
  const sr = audioBuffer.sampleRate;
  const data = audioBuffer.getChannelData(0);
  const startIdx = Math.floor(startSec * sr);
  const endIdx = Math.min(Math.floor(endSec * sr), data.length);
  const segment = data.slice(startIdx, endIdx);
  const N = segment.length;
 
  if (N < 2) return featureNames.map(() => 0);
 
  const vec = [];
 
  // Helper: compute FFT magnitude (simplified DFT for small segments, or approximation)
  let fftMag = null;
  const needSpectral = featureNames.some(f => ['centroid', 'bandwidth', 'rolloff', 'flatness', 'mfcc', 'chroma'].includes(f));
  if (needSpectral) {
    fftMag = computeFFTMagnitude(segment);
  }
 
  for (const fname of featureNames) {
    switch (fname) {
      case 'rms': {
        let sum = 0;
        for (let i = 0; i < N; i++) sum += segment[i] * segment[i];
        vec.push(Math.sqrt(sum / N));
        break;
      }
      case 'zcr': {
        let crossings = 0;
        for (let i = 1; i < N; i++) {
          if ((segment[i] >= 0) !== (segment[i - 1] >= 0)) crossings++;
        }
        vec.push(crossings / N);
        break;
      }
      case 'centroid': {
        vec.push(spectralCentroid(fftMag, sr));
        break;
      }
      case 'bandwidth': {
        const cent = spectralCentroid(fftMag, sr);
        vec.push(spectralBandwidth(fftMag, sr, cent));
        break;
      }
      case 'rolloff': {
        vec.push(spectralRolloff(fftMag, sr, 0.85));
        break;
      }
      case 'flatness': {
        vec.push(spectralFlatness(fftMag));
        break;
      }
      case 'mfcc': {
        const mfccs = computeMFCC(fftMag, sr, 13);
        vec.push(...mfccs);
        break;
      }
      case 'chroma': {
        const chroma = computeChroma(fftMag, sr);
        vec.push(...chroma);
        break;
      }
    }
  }
  return vec;
}
 
function computeFFTMagnitude(signal) {
  // Use power-of-2 FFT size
  let fftSize = 1;
  while (fftSize < signal.length) fftSize *= 2;
  fftSize = Math.min(fftSize, 4096); // cap for performance
 
  const re = new Float32Array(fftSize);
  const im = new Float32Array(fftSize);
  const len = Math.min(signal.length, fftSize);
 
  // Apply Hann window
  for (let i = 0; i < len; i++) {
    const w = 0.5 * (1 - Math.cos(2 * Math.PI * i / (len - 1)));
    re[i] = signal[i] * w;
  }
 
  fftInPlace(re, im);
 
  const mag = new Float32Array(fftSize / 2);
  for (let i = 0; i < mag.length; i++) {
    mag[i] = Math.sqrt(re[i] * re[i] + im[i] * im[i]);
  }
  return mag;
}
 
// Cooley-Tukey FFT in-place
function fftInPlace(re, im) {
  const n = re.length;
  // Bit reversal
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      [re[i], re[j]] = [re[j], re[i]];
      [im[i], im[j]] = [im[j], im[i]];
    }
  }
  // FFT
  for (let len = 2; len <= n; len *= 2) {
    const angle = -2 * Math.PI / len;
    const wRe = Math.cos(angle);
    const wIm = Math.sin(angle);
    for (let i = 0; i < n; i += len) {
      let curRe = 1, curIm = 0;
      for (let j = 0; j < len / 2; j++) {
        const uRe = re[i + j], uIm = im[i + j];
        const vRe = re[i + j + len / 2] * curRe - im[i + j + len / 2] * curIm;
        const vIm = re[i + j + len / 2] * curIm + im[i + j + len / 2] * curRe;
        re[i + j] = uRe + vRe;
        im[i + j] = uIm + vIm;
        re[i + j + len / 2] = uRe - vRe;
        im[i + j + len / 2] = uIm - vIm;
        const newCurRe = curRe * wRe - curIm * wIm;
        curIm = curRe * wIm + curIm * wRe;
        curRe = newCurRe;
      }
    }
  }
}
 
function spectralCentroid(mag, sr) {
  let num = 0, den = 0;
  for (let i = 0; i < mag.length; i++) {
    const freq = (i * sr) / (mag.length * 2);
    num += freq * mag[i];
    den += mag[i];
  }
  return den > 0 ? num / den : 0;
}
 
function spectralBandwidth(mag, sr, centroid) {
  let num = 0, den = 0;
  for (let i = 0; i < mag.length; i++) {
    const freq = (i * sr) / (mag.length * 2);
    num += mag[i] * (freq - centroid) ** 2;
    den += mag[i];
  }
  return den > 0 ? Math.sqrt(num / den) : 0;
}
 
function spectralRolloff(mag, sr, pct) {
  let total = 0;
  for (let i = 0; i < mag.length; i++) total += mag[i];
  const target = total * pct;
  let cumul = 0;
  for (let i = 0; i < mag.length; i++) {
    cumul += mag[i];
    if (cumul >= target) return (i * sr) / (mag.length * 2);
  }
  return sr / 2;
}
 
function spectralFlatness(mag) {
  let logSum = 0, linSum = 0, count = 0;
  for (let i = 1; i < mag.length; i++) {
    if (mag[i] > 0) {
      logSum += Math.log(mag[i]);
      linSum += mag[i];
      count++;
    }
  }
  if (count === 0 || linSum === 0) return 0;
  return Math.exp(logSum / count) / (linSum / count);
}
 
function computeMFCC(mag, sr, numCoeffs) {
  const numFilters = 26;
  const minMel = hzToMel(0);
  const maxMel = hzToMel(sr / 2);
  const melPoints = [];
  for (let i = 0; i <= numFilters + 1; i++) {
    melPoints.push(melToHz(minMel + (maxMel - minMel) * i / (numFilters + 1)));
  }
 
  const bins = melPoints.map(f => Math.floor((f / (sr / 2)) * mag.length));
  const filterEnergies = [];
 
  for (let m = 0; m < numFilters; m++) {
    let energy = 0;
    for (let k = bins[m]; k < bins[m + 2] && k < mag.length; k++) {
      let w = 0;
      if (k < bins[m + 1]) {
        w = (bins[m + 1] - bins[m]) > 0 ? (k - bins[m]) / (bins[m + 1] - bins[m]) : 0;
      } else {
        w = (bins[m + 2] - bins[m + 1]) > 0 ? (bins[m + 2] - k) / (bins[m + 2] - bins[m + 1]) : 0;
      }
      energy += mag[k] * mag[k] * w;
    }
    filterEnergies.push(energy > 0 ? Math.log(energy) : -10);
  }
 
  // DCT-II
  const mfccs = [];
  for (let i = 0; i < numCoeffs; i++) {
    let sum = 0;
    for (let j = 0; j < numFilters; j++) {
      sum += filterEnergies[j] * Math.cos(Math.PI * i * (j + 0.5) / numFilters);
    }
    mfccs.push(sum);
  }
  return mfccs;
}
 
function hzToMel(hz) { return 2595 * Math.log10(1 + hz / 700); }
function melToHz(mel) { return 700 * (Math.pow(10, mel / 2595) - 1); }
 
function computeChroma(mag, sr) {
  const chroma = new Float32Array(12);
  for (let i = 1; i < mag.length; i++) {
    const freq = (i * sr) / (mag.length * 2);
    if (freq < 20) continue;
    const midi = 12 * Math.log2(freq / 440) + 69;
    const bin = Math.round(midi) % 12;
    chroma[bin < 0 ? bin + 12 : bin] += mag[i] * mag[i];
  }
  // normalize
  let maxC = 0;
  for (let i = 0; i < 12; i++) if (chroma[i] > maxC) maxC = chroma[i];
  if (maxC > 0) for (let i = 0; i < 12; i++) chroma[i] /= maxC;
  return Array.from(chroma);
}
 
// ─── NORMALIZE MATRIX ────────────────────────────────────────
function normalizeMatrix(matrix) {
  const dim = matrix[0].length;
  const means = new Float32Array(dim);
  const stds = new Float32Array(dim);
  const n = matrix.length;
 
  for (let j = 0; j < dim; j++) {
    let sum = 0;
    for (let i = 0; i < n; i++) sum += matrix[i][j];
    means[j] = sum / n;
  }
  for (let j = 0; j < dim; j++) {
    let sum = 0;
    for (let i = 0; i < n; i++) sum += (matrix[i][j] - means[j]) ** 2;
    stds[j] = Math.sqrt(sum / n) || 1;
  }
 
  return matrix.map(row => row.map((v, j) => (v - means[j]) / stds[j]));
}
 
// ─── PCA ─────────────────────────────────────────────────────
function runPCA(data) {
  const n = data.length;
  const dim = data[0].length;
 
  // Covariance matrix
  const cov = [];
  for (let i = 0; i < dim; i++) {
    cov[i] = new Float32Array(dim);
    for (let j = 0; j <= i; j++) {
      let sum = 0;
      for (let k = 0; k < n; k++) sum += data[k][i] * data[k][j];
      cov[i][j] = sum / n;
      if (j !== i) cov[j][i] = cov[i][j];
    }
  }
 
  // Power iteration for top 2 eigenvectors
  const eigenvectors = [];
  for (let ev = 0; ev < 2; ev++) {
    let vec = new Float32Array(dim);
    for (let i = 0; i < dim; i++) vec[i] = Math.random() - 0.5;
 
    for (let iter = 0; iter < 100; iter++) {
      const newVec = new Float32Array(dim);
      for (let i = 0; i < dim; i++) {
        for (let j = 0; j < dim; j++) newVec[i] += cov[i][j] * vec[j];
      }
      // Deflate
      for (const prev of eigenvectors) {
        let dot = 0;
        for (let i = 0; i < dim; i++) dot += newVec[i] * prev[i];
        for (let i = 0; i < dim; i++) newVec[i] -= dot * prev[i];
      }
      // Normalize
      let norm = 0;
      for (let i = 0; i < dim; i++) norm += newVec[i] * newVec[i];
      norm = Math.sqrt(norm) || 1;
      for (let i = 0; i < dim; i++) newVec[i] /= norm;
      vec = newVec;
    }
    eigenvectors.push(vec);
  }
 
  // Project
  return data.map(row => {
    return eigenvectors.map(ev => {
      let sum = 0;
      for (let i = 0; i < dim; i++) sum += row[i] * ev[i];
      return sum;
    });
  });
}
 
// ─── t-SNE ───────────────────────────────────────────────────
async function runTSNE(data, perplexity, onProgress) {
  const n = data.length;
  const dim = data[0].length;
  perplexity = Math.min(perplexity, Math.floor((n - 1) / 3));
  if (perplexity < 1) perplexity = 1;
 
  // Pairwise distances
  const dist = new Float32Array(n * n);
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      let d = 0;
      for (let k = 0; k < dim; k++) d += (data[i][k] - data[j][k]) ** 2;
      dist[i * n + j] = d;
      dist[j * n + i] = d;
    }
  }
 
  // Compute P
  const P = new Float32Array(n * n);
  for (let i = 0; i < n; i++) {
    let lo = 1e-10, hi = 1e4, sigma = 1;
    for (let iter = 0; iter < 50; iter++) {
      sigma = (lo + hi) / 2;
      let sumP = 0;
      for (let j = 0; j < n; j++) {
        if (j === i) continue;
        P[i * n + j] = Math.exp(-dist[i * n + j] / (2 * sigma * sigma));
        sumP += P[i * n + j];
      }
      // entropy
      let H = 0;
      for (let j = 0; j < n; j++) {
        if (j === i) continue;
        const p = P[i * n + j] / sumP;
        if (p > 1e-10) H -= p * Math.log2(p);
      }
      if (H > Math.log2(perplexity)) hi = sigma;
      else lo = sigma;
    }
    let sumP = 0;
    for (let j = 0; j < n; j++) sumP += P[i * n + j];
    for (let j = 0; j < n; j++) P[i * n + j] /= sumP;
  }
 
  // Symmetrize
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const avg = (P[i * n + j] + P[j * n + i]) / (2 * n);
      P[i * n + j] = avg;
      P[j * n + i] = avg;
    }
  }
 
  // Initialize Y randomly
  const Y = [];
  for (let i = 0; i < n; i++) Y.push([Math.random() * 0.01, Math.random() * 0.01]);
 
  const gains = [];
  const veloc = [];
  for (let i = 0; i < n; i++) {
    gains.push([1, 1]);
    veloc.push([0, 0]);
  }
 
  const lr = 100;
  const iters = 300;
 
  for (let t = 0; t < iters; t++) {
    // Compute Q
    const qNum = new Float32Array(n * n);
    let qSum = 0;
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const d = (Y[i][0] - Y[j][0]) ** 2 + (Y[i][1] - Y[j][1]) ** 2;
        const v = 1 / (1 + d);
        qNum[i * n + j] = v;
        qNum[j * n + i] = v;
        qSum += 2 * v;
      }
    }
 
    // Gradient
    const exaggeration = t < 100 ? 4 : 1;
    for (let i = 0; i < n; i++) {
      let gx = 0, gy = 0;
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const pij = P[i * n + j] * exaggeration;
        const qij = qNum[i * n + j] / qSum;
        const mult = 4 * (pij - qij) * qNum[i * n + j];
        gx += mult * (Y[i][0] - Y[j][0]);
        gy += mult * (Y[i][1] - Y[j][1]);
      }
 
      // Update with momentum
      for (let d = 0; d < 2; d++) {
        const g = d === 0 ? gx : gy;
        gains[i][d] = (Math.sign(g) !== Math.sign(veloc[i][d])) ? gains[i][d] + 0.2 : gains[i][d] * 0.8;
        if (gains[i][d] < 0.01) gains[i][d] = 0.01;
        const mom = t < 100 ? 0.5 : 0.8;
        veloc[i][d] = mom * veloc[i][d] - lr * gains[i][d] * g;
        Y[i][d] += veloc[i][d];
      }
    }
 
    // Center
    let cx = 0, cy = 0;
    for (let i = 0; i < n; i++) { cx += Y[i][0]; cy += Y[i][1]; }
    cx /= n; cy /= n;
    for (let i = 0; i < n; i++) { Y[i][0] -= cx; Y[i][1] -= cy; }
 
    if (t % 30 === 0) {
      onProgress(t / iters);
      await new Promise(r => setTimeout(r, 0)); // yield
    }
  }
 
  return Y;
}
 
// ─── UMAP (simplified) ──────────────────────────────────────
function runUMAP(data, nNeighbors) {
  const n = data.length;
  const dim = data[0].length;
  nNeighbors = Math.min(nNeighbors, n - 1);
 
  // Pairwise distances
  const dists = [];
  for (let i = 0; i < n; i++) {
    const row = [];
    for (let j = 0; j < n; j++) {
      if (i === j) { row.push(0); continue; }
      let d = 0;
      for (let k = 0; k < dim; k++) d += (data[i][k] - data[j][k]) ** 2;
      row.push(Math.sqrt(d));
    }
    dists.push(row);
  }
 
  // k-nearest neighbors graph
  const knn = [];
  for (let i = 0; i < n; i++) {
    const indices = Array.from({ length: n }, (_, j) => j).filter(j => j !== i);
    indices.sort((a, b) => dists[i][a] - dists[i][b]);
    knn.push(indices.slice(0, nNeighbors));
  }
 
  // Compute fuzzy simplicial set (simplified)
  const graph = new Float32Array(n * n);
  for (let i = 0; i < n; i++) {
    const rho = dists[i][knn[i][0]]; // distance to nearest neighbor
    // Binary search for sigma
    let lo = 1e-10, hi = 100, sigma = 1;
    for (let iter = 0; iter < 50; iter++) {
      sigma = (lo + hi) / 2;
      let sum = 0;
      for (const j of knn[i]) {
        sum += Math.exp(-Math.max(0, dists[i][j] - rho) / sigma);
      }
      if (sum > Math.log2(nNeighbors)) hi = sigma;
      else lo = sigma;
    }
    for (const j of knn[i]) {
      graph[i * n + j] = Math.exp(-Math.max(0, dists[i][j] - rho) / sigma);
    }
  }
 
  // Symmetrize
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const v = graph[i * n + j] + graph[j * n + i] - graph[i * n + j] * graph[j * n + i];
      graph[i * n + j] = v;
      graph[j * n + i] = v;
    }
  }
 
  // Initialize with spectral-like init (just use PCA for stability)
  const Y = runPCA(data).map(c => [c[0] * 0.01, c[1] * 0.01]);
 
  // SGD optimization
  const epochs = 200;
  const aParam = 1.0, bParam = 1.0;
 
  for (let ep = 0; ep < epochs; ep++) {
    const lr = 1.0 * (1 - ep / epochs);
    for (let i = 0; i < n; i++) {
      for (const j of knn[i]) {
        const w = graph[i * n + j];
        if (w <= 0) continue;
        const dx = Y[i][0] - Y[j][0];
        const dy = Y[i][1] - Y[j][1];
        const d2 = dx * dx + dy * dy + 1e-10;
        const grad = -2 * aParam * bParam * Math.pow(d2, bParam - 1) / (1 + aParam * Math.pow(d2, bParam));
        Y[i][0] += lr * w * grad * dx;
        Y[i][1] += lr * w * grad * dy;
        Y[j][0] -= lr * w * grad * dx;
        Y[j][1] -= lr * w * grad * dy;
      }
 
      // Repulsion from random negative sample
      const neg = Math.floor(Math.random() * n);
      if (neg !== i) {
        const dx = Y[i][0] - Y[neg][0];
        const dy = Y[i][1] - Y[neg][1];
        const d2 = dx * dx + dy * dy + 1e-10;
        const repulse = 2 * bParam / ((0.001 + d2) * (1 + aParam * Math.pow(d2, bParam)));
        Y[i][0] += lr * repulse * dx;
        Y[i][1] += lr * repulse * dy;
      }
    }
  }
 
  return Y;
}
 
// ─── LEGEND ──────────────────────────────────────────────────
const FILE_COLORS = [
  '#ff6b4a', '#4af0c8', '#7b6bff', '#ffcb4a', '#ff4aaa',
  '#4ac8ff', '#8aff4a', '#ff8a4a', '#c84aff', '#4aff8a'
];
 
function buildLegend() {
  const legend = document.getElementById('legend');
  if (state.files.length <= 1) {
    legend.style.display = 'none';
    return;
  }
  legend.style.display = '';
  let html = '<div class="legend-title">Sources</div>';
  state.files.forEach((f, i) => {
    const color = FILE_COLORS[i % FILE_COLORS.length];
    html += `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${f.name}</div>`;
  });
  legend.innerHTML = html;
}
 
// ─── MAP RENDERING ───────────────────────────────────────────
function resizeCanvas() {
  const area = document.getElementById('canvasArea');
  canvas.width = area.clientWidth * dpr;
  canvas.height = area.clientHeight * dpr;
  canvas.style.width = area.clientWidth + 'px';
  canvas.style.height = area.clientHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (state.points.length) drawMap();
}
 
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
 
function worldToScreen(wx, wy) {
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  const padding = 60;
  const sx = (wx - state.view.x) * state.view.scale * ((w - padding * 2) / 2) + w / 2;
  const sy = (wy - state.view.y) * state.view.scale * ((h - padding * 2) / 2) + h / 2;
  return [sx, sy];
}
 
function screenToWorld(sx, sy) {
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  const padding = 60;
  const wx = (sx - w / 2) / (state.view.scale * ((w - padding * 2) / 2)) + state.view.x;
  const wy = (sy - h / 2) / (state.view.scale * ((h - padding * 2) / 2)) + state.view.y;
  return [wx, wy];
}
 
function drawMap() {
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  ctx.clearRect(0, 0, w, h);
 
  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let gx = -2; gx <= 2; gx += 0.25) {
    const [sx] = worldToScreen(gx, 0);
    if (sx > 0 && sx < w) {
      ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, h); ctx.stroke();
    }
  }
  for (let gy = -2; gy <= 2; gy += 0.25) {
    const [, sy] = worldToScreen(0, gy);
    if (sy > 0 && sy < h) {
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
    }
  }
 
  // Points
  const multiFile = state.files.length > 1;
  for (let i = 0; i < state.points.length; i++) {
    const p = state.points[i];
    const [sx, sy] = worldToScreen(p.x, p.y);
    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;
 
    const isHovered = i === state.hoveredIdx;
    const isPlaying = i === state.playingIdx;
    const baseColor = multiFile ? FILE_COLORS[p.fileIdx % FILE_COLORS.length] : '#ff6b4a';
    const radius = isHovered ? 7 : isPlaying ? 8 : 4;
 
    if (isPlaying) {
      ctx.beginPath();
      ctx.arc(sx, sy, 16, 0, Math.PI * 2);
      ctx.fillStyle = baseColor.replace(')', ', 0.15)').replace('rgb', 'rgba');
      if (!ctx.fillStyle.includes('rgba')) ctx.fillStyle = hexToRgba(baseColor, 0.15);
      ctx.fill();
    }
 
    ctx.beginPath();
    ctx.arc(sx, sy, radius, 0, Math.PI * 2);
    ctx.fillStyle = isHovered || isPlaying ? baseColor : hexToRgba(baseColor, 0.7);
    ctx.fill();
 
    if (isHovered) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}
 
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
 
// ─── INTERACTION ─────────────────────────────────────────────
let isDragging = false;
let dragStart = null;
let viewStart = null;
 
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = { x: e.offsetX, y: e.offsetY };
  viewStart = { x: state.view.x, y: state.view.y };
});
 
window.addEventListener('mousemove', e => {
  if (isDragging && dragStart) {
    const rect = canvas.getBoundingClientRect();
    const dx = (e.clientX - rect.left - dragStart.x);
    const dy = (e.clientY - rect.top - dragStart.y);
    const area = document.getElementById('canvasArea');
    const w = area.clientWidth;
    const h = area.clientHeight;
    state.view.x = viewStart.x - dx / (state.view.scale * (w / 2));
    state.view.y = viewStart.y - dy / (state.view.scale * (h / 2));
    drawMap();
    return;
  }
 
  if (!state.points.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
 
  let closest = -1;
  let closestDist = 20;
  for (let i = 0; i < state.points.length; i++) {
    const [sx, sy] = worldToScreen(state.points[i].x, state.points[i].y);
    const d = Math.sqrt((sx - mx) ** 2 + (sy - my) ** 2);
    if (d < closestDist) { closestDist = d; closest = i; }
  }
 
  if (closest !== state.hoveredIdx) {
    state.hoveredIdx = closest;
    drawMap();
  }
 
  const tooltip = document.getElementById('tooltip');
  if (closest >= 0) {
    canvas.style.cursor = 'pointer';
    const p = state.points[closest];
    const seg = p.segment;
    const [sx, sy] = worldToScreen(p.x, p.y);
    document.getElementById('ttTitle').textContent = state.files[p.fileIdx].name;
    document.getElementById('ttInfo').textContent = `${seg.start.toFixed(2)}s — ${seg.end.toFixed(2)}s (${((seg.end - seg.start) * 1000).toFixed(0)}ms)`;
    tooltip.style.display = '';
    tooltip.style.left = (sx + 16) + 'px';
    tooltip.style.top = (sy - 10) + 'px';
  } else {
    canvas.style.cursor = 'grab';
    tooltip.style.display = 'none';
  }
});
 
window.addEventListener('mouseup', () => { isDragging = false; });
 
canvas.addEventListener('click', e => {
  if (isDragging && dragStart) {
    const dx = Math.abs(e.offsetX - dragStart.x);
    const dy = Math.abs(e.offsetY - dragStart.y);
    if (dx > 5 || dy > 5) return; // was a drag, not a click
  }
  if (state.hoveredIdx >= 0) {
    playSegment(state.hoveredIdx);
  }
});
 
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoomMap(factor);
}, { passive: false });
 
function zoomMap(factor) {
  state.view.scale *= factor;
  state.view.scale = Math.max(0.2, Math.min(state.view.scale, 20));
  drawMap();
}
 
function resetView() {
  state.view = { x: 0, y: 0, scale: 1 };
  drawMap();
}
 
// ─── PLAYBACK ────────────────────────────────────────────────
function playSegment(idx) {
  const actx = getAudioCtx();
  if (actx.state === 'suspended') actx.resume();
 
  if (state.currentSource) {
    try { state.currentSource.stop(); } catch (e) {}
  }
 
  const p = state.points[idx];
  const seg = p.segment;
  const source = actx.createBufferSource();
  source.buffer = seg.audioBuffer;
  source.connect(actx.destination);
 
  const duration = seg.end - seg.start;
  source.start(0, seg.start, duration);
  state.currentSource = source;
  state.playingIdx = idx;
 
  const np = document.getElementById('nowPlaying');
  np.style.display = 'flex';
  document.getElementById('npText').textContent =
    `${state.files[p.fileIdx].name} — ${seg.start.toFixed(2)}s`;
 
  drawMap();
 
  source.onended = () => {
    if (state.playingIdx === idx) {
      state.playingIdx = -1;
      np.style.display = 'none';
      drawMap();
    }
  };
 
  setTimeout(() => {
    if (state.playingIdx === idx) {
      state.playingIdx = -1;
      np.style.display = 'none';
      drawMap();
    }
  }, duration * 1000 + 100);
}
